<style>
:root{--grn:#2E8B57;--grnsoft:#e3f1ea;--ink:#2b2b2b;--sub:#6b7280;--line:#e5e7eb;--card:#ffffff;--bg:#f4f7f5;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink);padding-bottom:80px}
.wrap{max-width:520px;margin:0 auto;padding:0 14px}
header{background:linear-gradient(135deg,#eef8f1,#dfeee6);color:#1f6b43;padding:18px 14px;position:sticky;top:0;z-index:20;box-shadow:0 1px 6px rgba(0,0,0,.05);border-bottom:1px solid #d3e7db}
header .in{max-width:520px;margin:0 auto;display:flex;align-items:center;gap:12px}
header img{width:52px;height:52px;border-radius:14px;background:#fff;padding:3px;border:1px solid #cfe6d8;box-shadow:0 1px 5px rgba(0,0,0,.12)}
header h1{font-size:17px;margin:0;font-weight:900;line-height:1.3}
header p{margin:2px 0 0;font-size:12px;color:#4f8c6b}
.tag{display:inline-block;background:#c0392b;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;margin-bottom:6px}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 0;position:sticky;top:90px;background:var(--bg);z-index:15}
.tab{flex:0 0 auto;border:none;background:#fff;color:var(--sub);font-weight:700;font-size:14px;padding:8px 14px;border-radius:999px;box-shadow:0 1px 3px rgba(0,0,0,.08);font-family:inherit}
.tab.on{color:#fff}
.card{background:var(--card);border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h2{font-size:15px;margin:0 0 10px;display:flex;align-items:center;gap:8px}
.row{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px}
.row:last-child{border:none}.row .k{color:var(--sub);flex:0 0 auto}.row .v{text-align:right;font-weight:500}
.hsr{background:#fff7 e6;background:#fdf6e3;border-radius:10px;padding:8px 10px;font-size:13px;margin-top:8px}
.pill{display:inline-block;font-size:12px;padding:2px 8px;border-radius:999px;background:var(--grnsoft);color:var(--grn);font-weight:700}
.count{font-size:26px;font-weight:900;color:var(--grn)}
.rl{display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px solid var(--line);font-size:15px}
.rl:last-child{border:none}
.rl .box{width:26px;height:26px;border-radius:7px;border:2px solid #cbd5e1;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.rl.ck .box{background:var(--grn);border-color:var(--grn)}
.rl.ck .nm{color:var(--sub);text-decoration:line-through}
.rl.lv{opacity:.5}.rl.lv .nm::after{content:"　請假";color:#c0392b;font-size:12px;font-weight:700;text-decoration:none}
.nm{flex:1}.staff .box{border-radius:50%}
.tl{display:flex;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.tl:last-child{border:none}.tl .t{flex:0 0 82px;font-weight:700;color:var(--grn);font-variant-numeric:tabular-nums}
.tl .n{color:#94a3b8;font-size:12px}
.ct{padding:8px 0;border-bottom:1px dashed var(--line);font-size:14px}.ct:last-child{border:none}
.ct b{display:block}.ct a{color:var(--grn);font-weight:700;text-decoration:none}.ct .ad{color:var(--sub);font-size:12.5px}
.note{font-size:13px;color:#444;padding-left:18px;position:relative;margin:6px 0}
.note::before{content:"•";position:absolute;left:4px;color:var(--grn)}
.sos{background:#fff0ee;border:1px solid #f5c6c0;border-radius:14px;padding:14px;margin:12px 0}
.sos h2{color:#c0392b}
.sos .big{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.sos .big a{flex:1;min-width:120px;text-align:center;background:#c0392b;color:#fff;font-weight:800;padding:12px;border-radius:12px;text-decoration:none;font-size:15px}
.fill{border-bottom:1px dotted #94a3b8;min-width:90px;display:inline-block}
.mini{font-size:11px;color:var(--sub);text-align:center;margin:16px 0 6px;line-height:1.6}
.reset{display:block;margin:4px auto 0;background:none;border:1px solid var(--line);color:var(--sub);font-size:12px;padding:6px 12px;border-radius:999px;font-family:inherit}
.pgrow{display:flex;align-items:center;gap:6px;padding:6px 2px;border-bottom:1px solid var(--line)}
.pgrow:last-child{border:none}
.pgname{flex:1;font-size:14px}
.pgcell{flex:0 0 66px;text-align:center;font-size:11px;color:var(--sub);line-height:1.25}
.pghead .pgcell{color:var(--ink);font-size:11px}
.pghead .pgname{color:var(--sub);font-size:12px;font-weight:700}
.pgtot{background:var(--grnsoft);border-radius:8px;font-weight:800;margin-top:2px}
.pgtot .pgname{color:var(--grn)}
.pgtot .pgcell{color:var(--grn);font-size:14px}
.pgtot2{font-size:11.5px;color:var(--sub)}
.ovamt{display:block;font-size:10px;color:#c0392b;font-weight:700;margin-top:1px;line-height:1}
.pgtot2 .pgname{color:var(--sub);font-weight:700}
.pgtot2 .pgcell{color:var(--ink)}
.paysum{margin-top:8px;background:var(--grnsoft);border-radius:10px;padding:4px 12px}
.paysum .row{border:none;padding:5px 0}
.copybtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;background:#fff;border:1.5px solid var(--grn);color:var(--grn);font-weight:800;font-size:14px;padding:11px;border-radius:12px;font-family:inherit;cursor:pointer}
.pbox{width:24px;height:24px;border-radius:7px;border:2px solid #cbd5e1;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:13px;cursor:pointer}
.pbox.on{background:var(--grn);border-color:var(--grn)}
.lunchbtn{flex:0 0 auto;border:1.5px solid #cbd5e1;background:#fff;color:var(--sub);font-weight:700;font-size:13px;padding:6px 10px;border-radius:10px;font-family:inherit}
.telbtn{margin-left:auto;width:30px;height:30px;border-radius:50%;background:var(--grnsoft);color:var(--grn);display:inline-flex;align-items:center;justify-content:center;text-decoration:none;font-size:13px;flex:0 0 auto}
.parow{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line)}
.maplink{display:block;color:var(--grn);font-size:12.5px;text-decoration:none;margin-top:2px}
.telnum{margin-left:auto;color:var(--grn);font-weight:700;font-size:12.5px;text-decoration:none;white-space:nowrap;flex:0 0 auto;display:inline-flex;align-items:center;gap:4px}
.syncstat{display:inline-block;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;margin:0 0 4px}
.syncstat.connecting{background:#fef3c7;color:#92400e}
.syncstat.online{background:#e3f1ea;color:#1f6b43}
.syncstat.offline{background:#fee2e2;color:#b91c1c}
.parow:last-child{border:none}
.pnm{flex:0 0 auto;font-size:15px}
.telbtn2{margin-left:auto;background:var(--grn);color:#fff;font-weight:700;font-size:14px;padding:8px 14px;border-radius:999px;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.linebtn{display:flex;align-items:center;justify-content:center;gap:8px;background:#06C755;color:#fff;font-weight:800;font-size:15px;padding:12px;border-radius:14px;text-decoration:none;margin:12px 0 0;box-shadow:0 2px 8px rgba(6,199,85,.28)}
details{margin-top:6px}summary{cursor:pointer;font-weight:700;font-size:13px;color:var(--grn)}
.warnbar{background:#fef3c7;color:#92400e;font-size:12px;text-align:center;padding:7px 10px;font-weight:600}

var SUPA_URL="https://crheylysleujrcrgergp.supabase.co";
var SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyaGV5bHlzbGV1anJjcmdlcmdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NDk1NDAsImV4cCI6MjA5OTQyNTU0MH0.CA97RppCg3dMY6ydhk2pP9ywZK1wQpele-u6B4gZlWM";
var BATCH="batch2";
var supa=null,lastSynced={},syncState='connecting';
function setStat(s){syncState=s;var el=document.getElementById('syncstat');if(!el)return;var m={connecting:'☁ 連線中…',online:'☁ 已同步',offline:'⚠ 離線（本機暫存，恢復後補傳）'};el.textContent=m[s]||s;el.className='syncstat '+s;}
function jeq(a,b){return JSON.stringify(a)===JSON.stringify(b);}
function syncPush(){
  if(!supa)return;
  var ups=[],dels=[],k;
  for(k in ST){ if(!jeq(ST[k],lastSynced[k])) ups.push({batch:BATCH,k:k,v:ST[k]}); }
  for(k in lastSynced){ if(!(k in ST)) dels.push(k); }
  if(!ups.length&&!dels.length)return;
  lastSynced=JSON.parse(JSON.stringify(ST));
  if(ups.length){ supa.from('camp_sync').upsert(ups,{onConflict:'batch,k'}).then(function(r){ setStat(r.error?'offline':'online'); }); }
  if(dels.length){ supa.from('camp_sync').delete().eq('batch',BATCH).in('k',dels).then(function(r){ if(r.error)setStat('offline'); }); }
}
function applyRemote(p){
  if(p.eventType==='DELETE'){ var k=p.old&&p.old.k; if(k!=null){ delete ST[k]; delete lastSynced[k]; } }
  else { var r=p.new; if(r){ ST[r.k]=r.v; lastSynced[r.k]=r.v; } }
  localStorage.setItem(SK,JSON.stringify(ST));
  render();
}
function syncInit(){
  if(!window.supabase){ setStat('offline'); return; }
  try{ supa=window.supabase.createClient(SUPA_URL,SUPA_KEY); }catch(e){ setStat('offline'); return; }
  supa.from('camp_sync').select('k,v').eq('batch',BATCH).then(function(res){
    if(res.error){ setStat('offline'); return; }
    var remote={}; (res.data||[]).forEach(function(r){ remote[r.k]=r.v; ST[r.k]=r.v; });
    localStorage.setItem(SK,JSON.stringify(ST));
    lastSynced=JSON.parse(JSON.stringify(remote));
    setStat('online');
    syncPush();
    render();
  });
  supa.channel('camp_'+BATCH)
    .on('postgres_changes',{event:'*',schema:'public',table:'camp_sync',filter:'batch=eq.'+BATCH},applyRemote)
    .subscribe(function(st){ if(st==='SUBSCRIBED'){ if(syncState!=='offline')setStat('online'); } else if(st==='CHANNEL_ERROR'||st==='TIMED_OUT'||st==='CLOSED'){ setStat('offline'); } });
}

 var dayTotal=fitems.reduce(function(a,it){var sum=0;DATA.students.forEach(function(s2){if(leave.includes(s2))return;if(it[3]&&it[3].indexOf(s2)>=0)return;sum+=iamt(it,s2);});return a+sum;},0);
 var collected0=0; fitems.forEach(function(it,ii){DATA.students.forEach(function(s2,idx){if(!leave.includes(s2)&&!(it[3]&&it[3].indexOf(s2)>=0)&&ST['pay#'+day.d+'#'+idx+'#'+ii])collected0+=iamt(it,s2);});});
 h+='<div class="paysum"><div class="row"><span class="k">應收總金額（'+present+' 人）</span><span class="v" style="font-weight:900;color:'+c+'">'+money(dayTotal)+'</span></div>'+

   let stat=Object.keys(cnt).map(k=>'<div class="row"><span class="k">'+esc(k)+'</span><span class="v" style="font-weight:800;color:'+c+'">'+cnt[k]+' 份</span></div>').join('');

function money(n){return (n<0?'－$':'$')+Math.abs(n).toLocaleString();}
function iamt(it,name){return (it[4]&&it[4][name]!=null)?it[4][name]:it[2];}
function paySummary(){
  var day=DATA.days[cur];var leave=DATA.leave[day.d]||[];var items=day.feeItems||[];
  var present=DATA.students.filter(function(s){return !leave.includes(s);}).length;
  var L=[];
  L.push('【第二梯・'+day.d+'（'+day.wk+'）代收對帳】');
  L.push(day.site);
  L.push('每人應繳 '+(day.amount||'')+'｜實到 '+present+' 人');
  if(items.length===0){L.push('（'+ (day.feeNote||day.fee||'') +'）'); return L.join('\n');}
  L.push('');
  var total=0,coll=0;
  items.forEach(function(it,ii){
    var paid=[],unpaid=[];
    var freeArr=(it[3]||[]).filter(function(x){return !leave.includes(x);}); DATA.students.forEach(function(s,idx){ if(leave.includes(s))return; if(it[3]&&it[3].indexOf(s)>=0)return; if(ST['pay#'+day.d+'#'+idx+'#'+ii])paid.push(s); else unpaid.push(s); });
    var pay=present-freeArr.length; var due=0; DATA.students.forEach(function(s2){if(leave.includes(s2))return;if(it[3]&&it[3].indexOf(s2)>=0)return;due+=iamt(it,s2);}); var got=0; paid.forEach(function(nm){got+=iamt(it,nm);}); total+=due; coll+=got;
    L.push('■ '+it[0]+' '+it[1]);
    L.push('　已收 '+paid.length+'/'+pay+'　'+money(got)+' / '+money(due));
    L.push('　未繳：'+(unpaid.length?unpaid.join('、'):'（無）'));
    if(freeArr.length)L.push('　免費：'+freeArr.join('、'));
    if(it[4]){var dl=Object.keys(it[4]).filter(function(nm){return !leave.includes(nm);}).map(function(nm){return nm+' $'+it[4][nm];}); if(dl.length)L.push('　優惠：'+dl.join('、'));}
  });
  L.push('');
  L.push('應收總金額（'+present+' 人）：'+money(total));
  L.push('已收金額：'+money(coll));
  return L.join('\n');
}
function toast(msg){var d=document.createElement('div');d.textContent=msg;d.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#333;color:#fff;padding:10px 16px;border-radius:999px;font-size:14px;z-index:99;box-shadow:0 2px 10px rgba(0,0,0,.3)';document.body.appendChild(d);setTimeout(function(){d.remove();},1800);}
function fallbackCopy(t){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();var ok=false;try{ok=document.execCommand('copy');}catch(e){}document.body.removeChild(ta);if(ok)toast('已複製對帳摘要');else alert('無法自動複製，請手動複製：\n\n'+t);}
function copyPay(){var t=paySummary();if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){toast('已複製對帳摘要');},function(){fallbackCopy(t);});}else{fallbackCopy(t);}}
function lunchSummary(){
  var day=DATA.days[cur]; if(!day.lunch)return '';
  var opts=day.lunch.options; var tchs=day.lunch.teachers||[]; var leaveL=DATA.leave[day.d]||[]; var NL=String.fromCharCode(10);
  var groups={}; opts.forEach(function(o){groups[o]=[];}); var unset=[];
  DATA.students.forEach(function(s2,idx){ if(leaveL.includes(s2))return; var v=ST['lunch#'+idx]; if(v>=0&&v<opts.length)groups[opts[v]].push(s2); else unset.push(s2); });
  tchs.forEach(function(t){ if(!groups[t[1]])groups[t[1]]=[]; groups[t[1]].push(t[0]); });
  var nStu=DATA.students.filter(function(s){return !leaveL.includes(s);}).length;
  var L=['【第二梯・'+day.d+'（'+day.wk+'）午餐統計・咕咕雞】'];
  Object.keys(groups).forEach(function(o){ L.push('■ '+o+'　'+groups[o].length+' 份'+(groups[o].length?'：'+groups[o].join('、'):'')); });
  L.push('尚未登記 '+unset.length+' 人'+(unset.length?'：'+unset.join('、'):''));
  if(tchs.length)L.push('老師飲料：'+tchs.map(function(t){return t[0]+' '+t[2];}).join('；'));
  L.push('合計 '+(nStu+tchs.length)+' 份（'+nStu+' 孩童＋'+tchs.length+' 老師）');
  return L.join(NL);
}
function copyLunch(){var t=lunchSummary();if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){toast('已複製午餐統計');},function(){fallbackCopy(t);});}else{fallbackCopy(t);}}
function paytog(el){var pk=el.dataset.k;ST[pk]=!ST[pk];if(!ST[pk])delete ST[pk];save();el.classList.toggle('on');el.innerHTML=ST[pk]?'<i class="fa-solid fa-check"></i>':'';updatePayTotals();}
function updatePayTotals(){var day=DATA.days[cur];var leave=DATA.leave[day.d]||[];var items=day.feeItems||[['',day.amount]];var present=DATA.students.filter(function(s){return !leave.includes(s);}).length;var collected=0;items.forEach(function(it,ii){var n=0;var f=(it[3]||[]).filter(function(x){return !leave.includes(x);}).length;DATA.students.forEach(function(s2,idx){if(!leave.includes(s2)&&!(it[3]&&it[3].indexOf(s2)>=0)&&ST['pay#'+day.d+'#'+idx+'#'+ii]){n++;collected+=iamt(it,s2);}});var el=document.getElementById('pt-'+ii);if(el)el.textContent=n+'/'+(present-f);});var pc=document.getElementById('paycollected');if(pc)pc.textContent=money(collected);}
function pick(idx,oi,el){const k='lunch#'+idx; ST[k]=(ST[k]===oi?undefined:oi); if(ST[k]===undefined)delete ST[k]; save(); render();}
function pickT(ti,oi,el){const k='lunchT#'+ti; ST[k]=(ST[k]===oi?undefined:oi); if(ST[k]===undefined)delete ST[k]; save(); render();}
function tog(key,el){ST[key]=!ST[key];save();el.classList.toggle('ck');el.querySelector('.box').innerHTML=ST[key]?'<i class="fa-solid fa-check"></i>':'';updateCount();}
function updateCount(){const day=DATA.days[cur];const leave=DATA.leave[day.d]||[];let n=0;DATA.students.forEach((s,idx)=>{if(!leave.includes(s)&&ST[day.d+'#'+idx])n++;});const el=document.getElementById('cnt');if(el)el.textContent=n;}
render();
syncInit();
</script></body></html>
